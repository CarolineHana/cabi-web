  (function () {
    function scaleScene() {
      var scene = document.getElementById('scene');
      var sw = window.innerWidth, sh = window.innerHeight;
      var scale = Math.min(sw / 1728, sh / 1117);
      var ox = (sw - 1728 * scale) / 2;
      var oy = (sh - 1117 * scale) / 2;
      scene.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + scale + ')';
    }
    window.addEventListener('resize', scaleScene);
    scaleScene();
  }());

    var CONTENT = {
      about: {
        heading: 'Our Story',
        text: '<p>We are Gabriela Franco (Gabi) and Caroline Hana (Caro), currently pursuing the joint Master in Design Engineering program between the Harvard Graduate School of Design and the Harvard John A. Paulson School of Engineering and Applied Sciences, where we first met and quickly connected through a shared interest in experimental technology, creative hardware, and hands-on making. Our collaboration grew from a mutual curiosity for how electronics, fabrication, and speculative design can expand creative practice and make technology feel more tangible, playful, and human.</p><p>Coming from distinct but complementary backgrounds, we bring different perspectives into the same creative process. Caro\'s expertise in hardware, embedded systems, and interactive prototyping intersects with Gabi\'s background in design, linguistics, spatial storytelling, and manufacturing. Together, we combine technical experimentation with design-driven thinking, developing projects that merge robotics, wearables, physical computing, and speculative objects.</p><p>Our process is grounded in rapid prototyping, iterative fabrication, and a shared enthusiasm for demystifying hardware. We approach technology not only as a functional tool, but also as a creative medium for storytelling, interaction, and exploration.</p><img src=\"assets/About Caroline.png\" class=\"about-subheading-img\" alt=\"About Caroline\"><p>Hi!! I am trained as an electrical engineer, was a software engineer at Google for 2 years, and someone who has spent a career trying to make technology more human. I grew up tinkering, studied EE at Princeton, and have spent writing code in industry that mostly lives inside infrastructure no one sees. Now, through a master\'s in design engineering at Harvard, I\'m asking a different question: what if the machines we build actually reflected the people who made them?</p><p>Teaching has always run alongside my technical work. As a math tutor, a TA for electrical engineering courses, running community art programs, and a workshop leader bringing Lego robotics to kids. Those experiences taught me making something approachable is its own craft.</p><p>Cyberdecks feel like an answer to that as the opposite of the black-boxed tech we work with every day. The cyberdeck residency is my chance to put both sides together: build something that belongs entirely to me, and document it in a way that invites someone else in.</p><a href=\"https://drive.google.com/file/d/1EjXuZ-ex7QsC2L4xc0CpMo8QDW6Tax03/view?usp=sharing\" class=\"resume-btn\" target=\"_blank\" rel=\"noopener\">RESUME &#8599;</a><hr class=\"about-divider\"><img src=\"assets/About Gabriela.png\" class=\"about-subheading-img\" alt=\"About Gabriela\"><p><strong>Different Ways of Saying the Same Thing</strong></p><p>My journey has taken me from architecture in Bogotá, to linguistics in Amherst, and eventually to design engineering in Cambridge, Massachusetts. I\'ve pursued big moves, whether academic, professional, or even geographic, each one exposing me to new ways of thinking and creating. Looking back, all these pursuits now feel coherent. Whether through buildings, language, or interactive objects, I\'ve always been fascinated by how ideas move from one person to another.</p><p><strong>Making Ideas Tangible</strong></p><p>What excites me most about creative technology is the moment an abstract idea becomes something you can hold, test, and interact with. I\'m especially drawn to digital fabrication and hardware because they give concepts a physical, tangible form.</p><p><strong>Creativity Is a Technology</strong></p><p>I\'ve become increasingly interested in challenging the divide people often draw between design and technology. Some of the most powerful projects I\'ve encountered emerge from their overlap, where creativity isn\'t decoration but a tool for exploration, invention, and problem-solving.</p><p><strong>Learning Through Iteration</strong></p><p>Design Engineering changed how I think about making. I used to focus on polished outcomes; now I\'m far more interested in process. Building, breaking, observing, and rebuilding, and the lessons in doing so, have become some of the most valuable parts of the work.</p><p><strong>Showing the Door</strong></p><p>I discovered interdisciplinary making, DIY hardware, and creative technology much later than I wish I had. Part of what motivates me now is helping make those paths more visible to others. If someone encounters my work while deciding what kind of creator they want to become, I hope they see possibilities I didn\'t know existed at their age.</p><a href=\"https://drive.google.com/file/d/1ydSxNRMJPLB4ArwANroiJqsCNhuLCHJt/view\" class=\"resume-btn\" target=\"_blank\" rel=\"noopener\">RESUME &#8599;</a>'
      },
      mission: {
        heading: 'Our Mission',
        text: '<video src=\"assets/cabi_mission.mp4\" class=\"mission-video\" autoplay muted loop playsinline controls></video><p>We believe technology should be approachable, expressive, and fun. In a culture increasingly centered around optimization and productivity, we are interested in reclaiming experimentation, play, and creativity as equally valuable ways of engaging with hardware and computational tools. Through speculative objects, wearables, robotics, and DIY electronics, we aim to create projects that invite curiosity rather than intimidation.</p><p>As women working across engineering, design, and fabrication, we are also invested in challenging the misconception that technical rigor and aesthetics exist in opposition. Too often, engineering and creative practice are treated as separate worlds, when in reality the most meaningful work often emerges through their intersection. By openly sharing our process, documentation, and knowledge, we hope to encourage more people, especially women, to explore creative technology for themselves and to see hardware not only as a tool for productivity, but also as a medium for expression, storytelling, and play.</p>'
      },

    var MAX_STACK_SHOW  = 5;    /* cards visible per side */
    var STACK_OFFSET    = 27;   /* px offset — scaled to 67% of original 40px */
    var currentPhotos   = [];
    var currentCaptions = [];

    /* ── Carousel state ───────────────────────────────────── */
    var featuredIdx     = 0;
    var isAnimating     = false;
    var wheelAccum      = 0;
    var wheelResetTimer = null;

    /* ── Focus-card state ─────────────────────────────────── */
    var focusCardEl   = null;   /* the floating .card-focus element */
    var focusDimmerEl = null;   /* the .card-focus-dimmer element   */
    var collapseCard  = null;   /* collapse function while expanded  */


    /* ── DOM helpers ──────────────────────────────────────── */
    function $id(id) { return document.getElementById(id); }

    /* ── Media type helpers ──────────────────────────────── */
    function isVideo(src) {
      return /\.(mp4|webm|ogg|mov)$/i.test(src);
    }
    function isGif(src) {
      return /\.gif$/i.test(src);
    }

    /* ── Build stack card media element ─────────────────── */
    function makeMediaEl(src, featured) {
      if (isVideo(src)) {
        var vid = document.createElement('video');
        vid.src = src;
        if (featured) {
          vid.controls = true;
        } else {
          vid.muted = true;
          vid.loop  = true;
          vid.setAttribute('playsinline', '');
        }
        vid.style.cssText = 'display:block;width:100%;height:100%;object-fit:cover;';
        return vid;
      } else {
        var img = document.createElement('img');
        img.src = src;
        img.alt = '';
        return img;
      }
    }

    /* ── Build carousel: left-stack | featured | right-stack ── */
    function buildDeck() {
      var n = currentPhotos.length;
      if (n === 0) return;

      /* ── 1. Featured photo (flat, centred) ──────────────── */
      var slot = $id('card-featured-slot');
      slot.innerHTML = '';
      var fc = document.createElement('div');
      var featuredSrc = currentPhotos[featuredIdx];
      fc.className = 'card-featured' + (isGif(featuredSrc) ? ' featured-gif' : '');
      var fMedia = makeMediaEl(featuredSrc, true);
      fc.appendChild(fMedia);
      if (!isVideo(featuredSrc)) {
        fc.addEventListener('click', function (e) {
          e.stopPropagation();
          expandCard(fc, featuredSrc);
        });
      }
      slot.appendChild(fc);

      /* ── 2. Per-photo caption ────────────────────────────── */
      $id('modal-caption').textContent =
        (currentCaptions && currentCaptions[featuredIdx]) || '';

      /* ── 3. Dot scroller ─────────────────────────────────── */
      var dotsEl = $id('carousel-dots');
      dotsEl.innerHTML = '';
      for (var d = 0; d < n; d++) {
        (function (dIdx) {
          var dot = document.createElement('div');
          dot.className = 'carousel-dot' + (dIdx === featuredIdx ? ' active' : '');
          dot.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!isAnimating && !focusCardEl) { featuredIdx = dIdx; buildDeck(); }
          });
          dotsEl.appendChild(dot);
        })(d);
      }

      /* ── 4. Right stack — NEXT photos only (no wrap).
         Front card at left:0, fans right. */
      var rightEl = $id('card-stack-right');
      rightEl.innerHTML = '';
      for (var r = 1; featuredIdx + r < n && (r - 1) < MAX_STACK_SHOW; r++) {
        (function (pIdx, pos) {
          var card = document.createElement('div');
          card.className = 'stack-card';
          card.style.left    = (pos * STACK_OFFSET) + 'px';
          card.style.zIndex  = MAX_STACK_SHOW - pos;
          card.style.opacity = 0.8;
          var media = makeMediaEl(currentPhotos[pIdx], false);
          card.appendChild(media);
          if (isVideo(currentPhotos[pIdx])) {
            var ov = document.createElement('div');
            ov.className = 'stack-video-overlay';
            ov.textContent = '▶';
            card.appendChild(ov);
          }
          card.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!isAnimating && !focusCardEl) { featuredIdx = pIdx; buildDeck(); }
          });
          rightEl.appendChild(card);
        }(featuredIdx + r, r - 1));
      }

      /* ── 5. Left stack — PREVIOUS photos only (no wrap).
         Starts empty at index 0; builds as user scrolls forward.
         Most-recent (pos=0) sits at BACK; older cards layer in front. */
      var leftEl = $id('card-stack-left');
      leftEl.innerHTML = '';
      for (var l = 1; l <= featuredIdx && (l - 1) < MAX_STACK_SHOW; l++) {
        (function (pIdx, pos) {
          var card = document.createElement('div');
          card.className = 'stack-card';
          card.style.right   = (pos * STACK_OFFSET) + 'px';
          card.style.zIndex  = pos + 1;   /* pos=0 → back, pos=4 → front */
          card.style.opacity = 0.8;
          var media = makeMediaEl(currentPhotos[pIdx], false);
          card.appendChild(media);
          if (isVideo(currentPhotos[pIdx])) {
            var ov = document.createElement('div');
            ov.className = 'stack-video-overlay';
            ov.textContent = '▶';
            card.appendChild(ov);
          }
          card.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!isAnimating && !focusCardEl) { featuredIdx = pIdx; buildDeck(); }
          });
          leftEl.appendChild(card);
        }(featuredIdx - l, l - 1));
      }
    }

    /* ── Carousel navigation ──────────────────────────────── */
    function advance() {
      if (isAnimating || focusCardEl) return;
      isAnimating = true;
      featuredIdx = (featuredIdx + 1) % currentPhotos.length;
      buildDeck();
      setTimeout(function () { isAnimating = false; }, 260);
    }
    function retreat() {
      if (isAnimating || focusCardEl) return;
      isAnimating = true;
      featuredIdx = (featuredIdx - 1 + currentPhotos.length) % currentPhotos.length;
      buildDeck();
      setTimeout(function () { isAnimating = false; }, 260);
    }

    /* ── Wheel handler: snap-scroll drives the carousel ────── */
    function handleCarouselWheel(e) {
      e.preventDefault();
      /* prefer horizontal delta, fall back to vertical */
      var delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      wheelAccum += delta;
      /* reset accumulator if the gesture stalls */
      clearTimeout(wheelResetTimer);
      wheelResetTimer = setTimeout(function () { wheelAccum = 0; }, 400);
      /* snap threshold: 40 px — fires once per deliberate flick */
      if (wheelAccum >= 40)  { wheelAccum = 0; advance(); }
      else if (wheelAccum <= -40) { wheelAccum = 0; retreat(); }
    }

    /* ── Update modal text ────────────────────────────────── */
    function setInfo(proj) {
      var img = $id('modalTitleImg');
      img.src = proj.titleImg || '';
      img.alt = proj.name;
      img.dataset.project = proj.key;
      $id('modalDesc').textContent = proj.desc;
    }

    /* ── Expand card to flat centered view ────────────────── */
    /*
     * Strategy: append a fresh .card-focus to <body> (outside all
     * 3D transform contexts) so position:fixed works against the
     * true viewport. Seed it at the card's current bounding rect,
     * then animate to center + flat + large.
     */
    function expandCard(cardEl, imgSrc) {
      if (focusCardEl) return;   /* already expanded */

      var rect  = cardEl.getBoundingClientRect();
      var EASE  = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';

      /* 1 — dimmer */
      focusDimmerEl = document.createElement('div');
      focusDimmerEl.className = 'card-focus-dimmer';
      document.body.appendChild(focusDimmerEl);
      void focusDimmerEl.offsetHeight;      /* force reflow before class add */
      focusDimmerEl.classList.add('active');

      /* 2 — focus card seeded at card's screen position */
      focusCardEl = document.createElement('div');
      focusCardEl.className = 'card-focus';
      focusCardEl.style.left   = rect.left   + 'px';
      focusCardEl.style.top    = rect.top    + 'px';
      focusCardEl.style.width  = rect.width  + 'px';
      focusCardEl.style.height = rect.height + 'px';

      var mediaEl;
      if (isVideo(imgSrc)) {
        mediaEl = document.createElement('video');
        mediaEl.src = imgSrc;
        mediaEl.controls = true;
        mediaEl.style.cssText = 'display:block;width:100%;height:100%;object-fit:cover;';
      } else {
        mediaEl = document.createElement('img');
        mediaEl.src = imgSrc;
      }
      focusCardEl.appendChild(mediaEl);
      document.body.appendChild(focusCardEl);

      /* 3 — next two frames: paint first, then start transition */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          /* size card to image's natural aspect ratio so no bars appear */
          var natW = (mediaEl.tagName === 'IMG' ? mediaEl.naturalWidth  : mediaEl.videoWidth)  || vw;
          var natH = (mediaEl.tagName === 'IMG' ? mediaEl.naturalHeight : mediaEl.videoHeight) || vh;
          var ratio = natW / natH || 1;
          var maxW  = vw * 0.94;
          var maxH  = vh * 0.92;
          var tw, th;
          if (maxW / ratio <= maxH) { tw = maxW; th = Math.round(maxW / ratio); }
          else                      { th = maxH; tw = Math.round(maxH * ratio); }
          focusCardEl.style.transition = [
            'left 0.44s '          + EASE,
            'top 0.44s '           + EASE,
            'width 0.44s '         + EASE,
            'height 0.44s '        + EASE,
            'border-radius 0.44s ease'
          ].join(', ');
          focusCardEl.style.left         = ((vw - tw) / 2) + 'px';
          focusCardEl.style.top          = ((vh - th) / 2) + 'px';
          focusCardEl.style.width        = tw + 'px';
          focusCardEl.style.height       = th + 'px';
          focusCardEl.style.borderRadius = '22px';
        });
      });

      /* 4 — collapse function: animate back to original rect */
      collapseCard = function () {
        var fc = focusCardEl;
        var fd = focusDimmerEl;
        focusCardEl  = null;
        focusDimmerEl = null;
        collapseCard  = null;

        fc.style.transition = [
          'left 0.32s '          + EASE,
          'top 0.32s '           + EASE,
          'width 0.32s '         + EASE,
          'height 0.32s '        + EASE,
          'border-radius 0.32s ease'
        ].join(', ');
        fc.style.left         = rect.left   + 'px';
        fc.style.top          = rect.top    + 'px';
        fc.style.width        = rect.width  + 'px';
        fc.style.height       = rect.height + 'px';
        fc.style.borderRadius = '12px';
        fd.classList.remove('active');

        setTimeout(function () {
          if (fc.parentNode) fc.parentNode.removeChild(fc);
          if (fd.parentNode) fd.parentNode.removeChild(fd);
        }, 360);
      };

      focusCardEl.addEventListener('click',   collapseCard);
      focusDimmerEl.addEventListener('click', collapseCard);
    }

    /* ── Open modal ───────────────────────────────────────── */
    function openModal(key) {
      var proj = PROJECTS.find(function (p) { return p.key === key; });
      if (!proj) return;
      currentPhotos   = proj.photos;
      currentCaptions = proj.captions || [];
      featuredIdx     = 0;
      isAnimating     = false;
      wheelAccum      = 0;
      buildDeck();
      setInfo(proj);
      $id('projectModal').dataset.project = key;
      $id('projectModal').classList.add('active');
    }

    /* ── Close modal ──────────────────────────────────────── */
    function closeModal() {
      if (collapseCard) collapseCard();   /* tear down any open focus card */
      isAnimating = false;
      wheelAccum  = 0;
      delete $id('projectModal').dataset.project;
      $id('projectModal').classList.remove('active');
    }

    /* ── Section page functions ───────────────────────────── */
    function goToSection(key) {
      var data = CONTENT[key];
      $id('sec-heading').textContent       = data.heading;
      $id('sec-text').innerHTML             = data.text;
      $id('sec-text-container').scrollTop  = 0;
      $id('text-fade').style.opacity       = '1';

      ['btn', 'sec-btn'].forEach(function (prefix) {
        ['about', 'mission', 'proposal'].forEach(function (k) {
          var btn = $id(prefix + '-' + k);
          if (btn) btn.classList.toggle('active', k === key);
        });
      });

      $id('page-section').classList.add('active');
      document.body.classList.add('section-active');
    }

    function backToProjects() {
      document.querySelectorAll('.nav-btn').forEach(function (b) {
        b.classList.remove('active');
      });
      $id('page-section').classList.remove('active');
      document.body.classList.remove('section-active');
    }

    /* ── Wire up events ───────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      /* project thumbnails on main canvas */
      document.querySelectorAll('.img-link[data-project]').forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          openModal(link.dataset.project);
        });
      });

      /* close button */
      $id('modalClose').addEventListener('click', closeModal);

      /* click on dark overlay → close modal */
      $id('projectModal').addEventListener('click', function (e) {
        if (e.target === $id('projectModal')) closeModal();
      });

      /* nav buttons — canvas bar + section bar */
      ['about', 'mission', 'proposal'].forEach(function (key) {
        var btn    = $id('btn-' + key);
        var secBtn = $id('sec-btn-' + key);
        if (btn)    btn.addEventListener('click',    function () { goToSection(key); });
        if (secBtn) secBtn.addEventListener('click', function () { goToSection(key); });
      });

      /* back button */
      $id('btn-back').addEventListener('click', backToProjects);

      /* scroll → update bottom fade mask */
      $id('sec-text-container').addEventListener('scroll', function () {
        var c = $id('sec-text-container');
        var atBottom = c.scrollTop + c.clientHeight >= c.scrollHeight - 10;
        $id('text-fade').style.opacity = atBottom ? '0' : '1';
      });

      /* Escape: collapse focus card → close modal → close section */
      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        if (collapseCard) {
          collapseCard();
        } else if ($id('projectModal').classList.contains('active')) {
          closeModal();
        } else {
          backToProjects();
        }
      });

      /* Wheel on modal → drive carousel (left/right scroll) */
      $id('projectModal').addEventListener('wheel', handleCarouselWheel, { passive: false });
    });

  }());
  </script>

</body>
</html>
